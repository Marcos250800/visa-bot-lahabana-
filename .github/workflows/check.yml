name: Check Visa Appointments

on:
  schedule:
    # Cada 5 minutos. Nota: GitHub Actions cron suele tener latencia 5-15 min
    # según carga. Para mayor fiabilidad, dispara también desde cron-job.org
    # vía workflow_dispatch (ver README).
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write  # necesario para commitear state.txt

concurrency:
  group: visa-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python monitor.py

      - name: Upload debug HTML on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: last_run_html
          path: last_run.html
          retention-days: 3

      - name: Commit state change
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.txt
          if ! git diff --staged --quiet; then
            git commit -m "chore: update state [skip ci]"
            git push
          else
            echo "Sin cambios de estado."
          fi
